name: Deploy production env (hotfix)

on:
  push:
    branches:
      - main
    paths:
      - '.env1.txt'
      - '.github/workflows/deploy-env.yml'
      - 'public/index.php'
      - 'bootstrap/app.php'
  workflow_dispatch:

jobs:
  deploy-env:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Instalacja lftp
        run: sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq lftp

      - name: Pobierz i napraw .env na właściwym docroot
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          set -euo pipefail
          REMOTE_DIR="public_html/ekstraklasa/"

          lftp -c "
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER};
            cd ${REMOTE_DIR};
            get .env -o /tmp/prod.env || true;
            bye
          "

          if [ -n "${PRODUCTION_ENV:-}" ]; then
            printf '%s\n' "${PRODUCTION_ENV}" > /tmp/prod.env
          elif [ ! -f /tmp/prod.env ]; then
            cp .env1.txt /tmp/prod.env
          fi

          echo "=== Production .env keys (redacted) ==="
          sed -E 's/^(APP_KEY|DB_PASSWORD|MAIL_PASSWORD|API_FOOTBALL_KEY|.*_SECRET)=.*/\1=(redacted)/' /tmp/prod.env

          # Napraw typowe przyczyny 500 na shared hostingu
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/prod.env')
          lines = path.read_text().splitlines()
          kv = {}
          order = []
          for line in lines:
              if not line or line.startswith('#') or '=' not in line:
                  order.append(('raw', line))
                  continue
              k, v = line.split('=', 1)
              kv[k] = v
              order.append(('kv', k))

          def set_key(key, value):
              kv[key] = value
              if not any(t == 'kv' and k == key for t, k in order):
                  order.append(('kv', key))

          set_key('APP_ENV', 'production')
          set_key('APP_DEBUG', 'false')
          set_key('APP_URL', 'https://ekstraklasa.9liga.waw.pl')
          set_key('SESSION_DRIVER', 'file')
          set_key('CACHE_STORE', 'file')
          set_key('QUEUE_CONNECTION', 'sync')
          if not kv.get('APP_KEY', '').startswith('base64:'):
              import base64, os
              set_key('APP_KEY', 'base64:' + base64.b64encode(os.urandom(32)).decode())

          out = []
          seen = set()
          for t, k in order:
              if t == 'raw':
                  out.append(k)
              elif k not in seen:
                  out.append(f'{k}={kv[k]}')
                  seen.add(k)
          for k, v in kv.items():
              if k not in seen:
                  out.append(f'{k}={v}')
          path.write_text('\n'.join(out) + '\n')
          PY

          cp /tmp/prod.env .env

          lftp -c "
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER};
            cd ${REMOTE_DIR};
            put -O . .env;
            put -O bootstrap bootstrap/app.php;
            mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs bootstrap/cache;
            put -O storage/framework/sessions storage/framework/sessions/.gitkeep;
            put -O storage/framework/views storage/framework/views/.gitkeep;
            put -O storage/framework/cache/data storage/framework/cache/data/.gitkeep;
            put -O storage/logs storage/logs/.gitkeep;
            put -O bootstrap/cache bootstrap/cache/.gitkeep;
            rm -f public/index.php public/diag.php public/__diag.php;
            put -O public public/index.php;
            rm -f bootstrap/cache/config.php;
            chmod 777 storage storage/framework storage/framework/sessions storage/framework/views storage/framework/cache storage/framework/cache/data storage/logs bootstrap/cache;
            ls -l .env;
            ls -l public/index.php;
            bye
          "

      - name: Sprawdź HTTP i logi
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          REMOTE_DIR="public_html/ekstraklasa/"

          sleep 2
          echo "=== HTTP ==="
          curl -sS -o /dev/null -w 'home:%{http_code}\n' 'https://ekstraklasa.9liga.waw.pl/'
          curl -sS -o /dev/null -w 'login:%{http_code}\n' 'https://ekstraklasa.9liga.waw.pl/login'
          curl -sS -o /dev/null -w 'up:%{http_code}\n' 'https://ekstraklasa.9liga.waw.pl/up'
