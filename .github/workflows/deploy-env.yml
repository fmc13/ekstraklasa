name: Deploy production env (hotfix)

on:
  push:
    branches:
      - main
    paths:
      - '.env1.txt'
      - '.github/workflows/deploy-env.yml'
      - 'deployment/migrate-once.php'
      - 'public/index.php'
      - 'bootstrap/app.php'
      - 'config/database.php'
  workflow_dispatch:

jobs:
  deploy-env:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Instalacja lftp
        run: sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq lftp

      - name: Przywróć MySQL .env, wgraj config, odpal migracje na serwerze
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          set -euo pipefail
          REMOTE_DIR="public_html/ekstraklasa/"

          lftp -c "
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER};
            cd ${REMOTE_DIR};
            get .env -o /tmp/remote.env || true;
            bye
          " || true

          # Źródło prawdy dla MySQL: secret PRODUCTION_ENV, potem remote .env, na końcu .env1.txt
          if [ -n "${PRODUCTION_ENV:-}" ]; then
            printf '%s\n' "${PRODUCTION_ENV}" > /tmp/prod.env
          elif [ -f /tmp/remote.env ]; then
            cp /tmp/remote.env /tmp/prod.env
          else
            cp .env1.txt /tmp/prod.env
          fi

          python3 - <<'PY'
          from pathlib import Path
          import base64, os
          path = Path('/tmp/prod.env')
          lines = path.read_text().splitlines()
          kv = {}
          order = []
          for line in lines:
              if not line or line.startswith('#') or '=' not in line:
                  order.append(('raw', line))
                  continue
              k, v = line.split('=', 1)
              kv[k] = v
              order.append(('kv', k))

          def set_key(key, value):
              kv[key] = value
              if not any(t == 'kv' and k == key for t, k in order):
                  order.append(('kv', key))

          set_key('APP_ENV', 'production')
          set_key('APP_DEBUG', 'false')
          set_key('APP_URL', 'https://ekstraklasa.9liga.waw.pl')
          set_key('SESSION_DRIVER', 'file')
          set_key('CACHE_STORE', 'file')
          set_key('QUEUE_CONNECTION', 'sync')

          # Baza ma pozostać MySQL — nigdy nie nadpisujemy na sqlite.
          if kv.get('DB_CONNECTION', '').lower() == 'sqlite':
              # Odzyskaj MySQL z remote.env jeśli secret/template pomyłkowo ma sqlite
              remote = Path('/tmp/remote.env')
              if remote.exists():
                  for line in remote.read_text().splitlines():
                      if not line or line.startswith('#') or '=' not in line:
                          continue
                      k, v = line.split('=', 1)
                      if k.startswith('DB_'):
                          set_key(k, v)

          if kv.get('DB_CONNECTION', '').lower() != 'mysql':
              set_key('DB_CONNECTION', 'mysql')

          required = ['DB_HOST', 'DB_DATABASE', 'DB_USERNAME', 'DB_PASSWORD']
          missing = [k for k in required if not kv.get(k)]
          if missing:
              raise SystemExit(f'Brak wymaganych kluczy MySQL w .env: {", ".join(missing)}')

          if not kv.get('APP_KEY', '').startswith('base64:'):
              set_key('APP_KEY', 'base64:' + base64.b64encode(os.urandom(32)).decode())

          out = []
          seen = set()
          for t, k in order:
              if t == 'raw':
                  out.append(k)
              elif k in kv and k not in seen:
                  out.append(f'{k}={kv[k]}')
                  seen.add(k)
          for k, v in kv.items():
              if k not in seen:
                  out.append(f'{k}={v}')
          path.write_text('\n'.join(out) + '\n')
          PY

          echo "=== Production .env keys (redacted) ==="
          sed -E 's/^(APP_KEY|DB_PASSWORD|MAIL_PASSWORD|API_FOOTBALL_KEY|.*_SECRET)=.*/\1=(redacted)/' /tmp/prod.env
          grep -E '^DB_' /tmp/prod.env | sed -E 's/^(DB_PASSWORD)=.*/\1=(redacted)/'

          cp /tmp/prod.env .env

          # Jednorazowy token + skrypt migracji (shared hosting bez SSH)
          MIGRATE_TOKEN=$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')
          mkdir -p storage/app
          printf '%s' "$MIGRATE_TOKEN" > storage/app/migrate.token
          cp deployment/migrate-once.php public/__migrate_once.php

          lftp -c "
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            set net:max-retries 3;
            open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER};
            cd ${REMOTE_DIR};
            put -O . .env;
            put -O bootstrap bootstrap/app.php;
            put -O config config/database.php;
            mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs storage/app bootstrap/cache;
            put -O storage/framework/sessions storage/framework/sessions/.gitkeep;
            put -O storage/framework/views storage/framework/views/.gitkeep;
            put -O storage/framework/cache/data storage/framework/cache/data/.gitkeep;
            put -O storage/logs storage/logs/.gitkeep;
            put -O storage/app storage/app/migrate.token;
            put -O bootstrap/cache bootstrap/cache/.gitkeep;
            rm -f public/index.php public/diag.php public/__diag.php;
            put -O public public/index.php;
            put -O public public/__migrate_once.php;
            rm -f bootstrap/cache/config.php;
            chmod 777 storage storage/framework storage/framework/sessions storage/framework/views storage/framework/cache storage/framework/cache/data storage/logs storage/app bootstrap/cache;
            ls -l .env;
            ls -l config/database.php;
            ls -l public/__migrate_once.php;
            bye
          "

          echo "=== Uruchamiam migracje MySQL na serwerze ==="
          sleep 2
          migrate_body=$(curl -sS -w '\nHTTP:%{http_code}' \
            "https://ekstraklasa.9liga.waw.pl/__migrate_once.php?token=${MIGRATE_TOKEN}")
          echo "$migrate_body"
          echo "$migrate_body" | grep -q 'MIGRATE_OK' || {
            echo "Migracja MySQL nie powiodła się" >&2
            # sprzątanie na wypadek gdy skrypt nie usunął się sam
            lftp -c "
              set ssl:verify-certificate no;
              set ftp:passive-mode true;
              open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER};
              cd ${REMOTE_DIR};
              rm -f public/__migrate_once.php storage/app/migrate.token;
              get storage/logs/laravel.log -o /tmp/laravel.log || true;
              bye
            " || true
            tail -n 80 /tmp/laravel.log >&2 || true
            exit 1
          }

          # Upewnij się, że one-shot nie został
          lftp -c "
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER};
            cd ${REMOTE_DIR};
            rm -f public/__migrate_once.php storage/app/migrate.token;
            bye
          " || true

      - name: Sprawdź HTTP i logowanie
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          REMOTE_DIR="public_html/ekstraklasa/"

          sleep 2
          echo "=== HTTP ==="
          curl -sS -o /dev/null -w 'home:%{http_code}\n' 'https://ekstraklasa.9liga.waw.pl/'
          curl -sS -o /dev/null -w 'login:%{http_code}\n' 'https://ekstraklasa.9liga.waw.pl/login'
          curl -sS -o /dev/null -w 'up:%{http_code}\n' 'https://ekstraklasa.9liga.waw.pl/up'

          echo "=== live DB_* (redacted) ==="
          lftp -c "
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER};
            cd ${REMOTE_DIR};
            get .env -o /tmp/live.env;
            bye
          "
          grep -E '^DB_' /tmp/live.env | sed -E 's/^(DB_PASSWORD)=.*/\1=(redacted)/'
          grep -qE '^DB_CONNECTION=mysql' /tmp/live.env

          echo "=== POST /login (expect not 500) ==="
          rm -f /tmp/cj
          curl -sS -c /tmp/cj -b /tmp/cj -o /tmp/login-get.html -w 'GET:%{http_code}\n' \
            'https://ekstraklasa.9liga.waw.pl/login'
          XSRF=$(awk '$6=="XSRF-TOKEN"{print $7}' /tmp/cj | python3 -c 'import sys,urllib.parse; print(urllib.parse.unquote(sys.stdin.read().strip()))')
          code=$(curl -sS -c /tmp/cj -b /tmp/cj -o /tmp/login-post.html -w '%{http_code}' \
            -X POST 'https://ekstraklasa.9liga.waw.pl/login' \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "Accept: text/html,application/xhtml+xml" \
            -H "X-XSRF-TOKEN: $XSRF" \
            -H "X-Requested-With: XMLHttpRequest" \
            --data-urlencode "email=nobody@example.com" \
            --data-urlencode "password=wrong-password")
          echo "POST login:$code"
          if [ "$code" = "500" ]; then
            echo "Login nadal zwraca 500" >&2
            lftp -c "
              set ssl:verify-certificate no;
              set ftp:passive-mode true;
              open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER};
              cd ${REMOTE_DIR};
              get storage/logs/laravel.log -o /tmp/laravel.log || true;
              bye
            "
            tail -n 100 /tmp/laravel.log >&2 || true
            exit 1
          fi
          echo "Login POST OK (nie 500): $code"
