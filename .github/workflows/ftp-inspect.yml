name: Inspect production FTP layout

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Instalacja lftp
        run: sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq lftp

      - name: Listowanie struktury FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          set -euo pipefail
          REMOTE_DIR="${FTP_PATH%/}/"
          echo "FTP_PATH=${REMOTE_DIR}"

          lftp -c "
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER};
            pwd;
            echo '=== ROOT LS ===';
            cls -l;
            echo '=== CD FTP_PATH ===';
            cd ${REMOTE_DIR};
            pwd;
            cls -l;
            echo '=== public ===';
            cls -l public/ || true;
            echo '=== bootstrap ===';
            cls -l bootstrap/ || true;
            echo '=== find index.php ===';
            find -name index.php || true;
            echo '=== find .env ===';
            find -name '.env' || true;
            echo '=== find artisan ===';
            find -name artisan || true;
            echo '=== parent ===';
            cd ..;
            pwd;
            cls -l;
            bye
          "
