name: Deploy Laravel to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          extensions: mbstring, xml, ctype, fileinfo, mysql, sqlite, tokenizer, pdo, pdo_mysql, pdo_sqlite

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - name: Instalacja zależności PHP
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Instalacja zależności Node
        run: npm ci

      - name: Przygotowanie .env pod build produkcyjny
        run: |
          cp .env.example .env
          php artisan key:generate --force --no-interaction
          sed -i 's|^APP_URL=.*|APP_URL=https://ekstraklasa.9liga.waw.pl|' .env
          # Vite base musi być /build/ — inaczej @font-face wskazuje na /assets/ (404)
          printf '\nVITE_BASE=/build/\n' >> .env
          grep -E '^APP_URL=|^VITE_BASE=' .env
          php artisan wayfinder:generate --with-form --no-interaction

      - name: Budowanie assetów frontendu
        run: npm run build

      - name: Weryfikacja URL-i w zbudowanych assetach
        run: |
          if grep -R -E -q 'localhost/ekstraklasa|/ekstraklasa/public/' public/build; then
            echo "Build zawiera lokalne ścieżki /ekstraklasa/public — przerywam deploy" >&2
            grep -R -n -E 'localhost/ekstraklasa|/ekstraklasa/public/' public/build | head -20 >&2
            exit 1
          fi
          if grep -R -E -q 'url\("/assets/' public/build; then
            echo "Build ma fonty pod /assets/ zamiast /build/assets/ — przerywam deploy" >&2
            grep -R -n -E 'url\("/assets/' public/build | head -20 >&2
            exit 1
          fi
          echo "Asset URLs OK (brak localhost/ekstraklasa, fonty pod /build/assets/)"

      - name: Przygotowanie produkcyjnego .env do wdrożenia
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          if [ -n "${PRODUCTION_ENV}" ]; then
            printf '%s\n' "${PRODUCTION_ENV}" > .env
          elif [ -f .env1.txt ]; then
            cp .env1.txt .env
          else
            echo "Brak secrets.PRODUCTION_ENV oraz pliku .env1.txt" >&2
            exit 1
          fi

          if ! grep -qE '^APP_KEY=base64:.+' .env; then
            php artisan key:generate --force --no-interaction
          fi

          mkdir -p database \
            storage/framework/sessions \
            storage/framework/views \
            storage/framework/cache/data \
            storage/logs \
            storage/app/public \
            storage/app/private \
            bootstrap/cache

          # Placeholdery, żeby puste katalogi trafiły na FTP
          touch \
            storage/framework/sessions/.gitkeep \
            storage/framework/views/.gitkeep \
            storage/framework/cache/data/.gitkeep \
            storage/logs/.gitkeep \
            bootstrap/cache/.gitkeep

          # SQLite: migracje w CI. MySQL: migracje po FTP (localhost niedostępny z CI).
          if grep -qE '^DB_CONNECTION=sqlite' .env; then
            rm -f database/database.sqlite
            touch database/database.sqlite
            php artisan migrate --force --no-interaction
            php artisan db:seed --force --no-interaction
          fi

          if grep -qE '^DB_CONNECTION=mysql' .env; then
            echo "Produkcja MySQL — migracje zostaną uruchomione na serwerze po FTP"
          fi

          # Wymuszamy upload plików ignorowanych przez .gitignore
          git add -f .env vendor public/build database/database.sqlite \
            storage/framework/sessions/.gitkeep \
            storage/framework/views/.gitkeep \
            storage/framework/cache/data/.gitkeep \
            storage/logs/.gitkeep \
            bootstrap/cache/.gitkeep

      - name: Wdrożenie przez FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Secret FTP_PATH wskazywał zły katalog (literówka). Docroot subdomeny:
          server-dir: public_html/ekstraklasa/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.env.*
            **/.env1.txt
            **/storage/logs/*.log
            **/storage/debugbar/**
            **/README.md
            **/phpunit.xml
            **/.editorconfig
            **/.gitattributes
            **/.gitignore
            **/Dane/**
            **/.ftp-deploy-sync-state.json

      - name: Migracje MySQL na serwerze (one-shot)
        if: ${{ hashFiles('.env') != '' }}
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          if ! grep -qE '^DB_CONNECTION=mysql' .env; then
            echo "Nie MySQL — pomijam migracje zdalne"
            exit 0
          fi

          sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq lftp
          REMOTE_DIR="public_html/ekstraklasa/"
          MIGRATE_TOKEN=$(python3 -c 'import secrets; print(secrets.token_urlsafe(32))')
          mkdir -p storage/app
          printf '%s' "$MIGRATE_TOKEN" > storage/app/migrate.token
          cp deployment/migrate-once.php public/__migrate_once.php

          lftp -c "
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER};
            cd ${REMOTE_DIR};
            mkdir -p storage/app;
            put -O storage/app storage/app/migrate.token;
            put -O public public/__migrate_once.php;
            bye
          "

          sleep 2
          body=$(curl -sS -w '\nHTTP:%{http_code}' \
            "https://ekstraklasa.9liga.waw.pl/__migrate_once.php?token=${MIGRATE_TOKEN}")
          echo "$body"
          echo "$body" | grep -q 'MIGRATE_OK'

          lftp -c "
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            open -u ${FTP_USERNAME},${FTP_PASSWORD} ${FTP_SERVER};
            cd ${REMOTE_DIR};
            rm -f public/__migrate_once.php storage/app/migrate.token;
            bye
          " || true
